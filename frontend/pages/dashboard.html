<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Slot | Virtual Lab</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet"
/>

<style>

body{
background: linear-gradient(135deg,#eef4ff,#f8fbff);
min-height:100vh;
}

.navbar{
background:#111827;
}

.booking-card{
background:white;
border:none;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.form-control{
height:50px;
border-radius:10px;
}

.btn-book{
height:50px;
border-radius:10px;
font-weight:600;
}

.info-box{
background:#f8fbff;
border-left:4px solid #0d6efd;
padding:14px;
border-radius:10px;
}

</style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold">
🔬 Virtual Lab
</a>

<a href="maindashboard.html"
class="btn btn-outline-light">
← Dashboard
</a>
</div>
</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-7">

<div class="booking-card p-5">

<h2 class="text-center mb-2">
📅 Book Lab Slot
</h2>

<p class="text-center text-muted mb-4">
Request a new experiment slot
</p>

<div class="info-box mb-4">
Approved requests will appear in your Main Dashboard.
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label>User ID</label>
<input
type="number"
id="userId"
class="form-control"
/>
</div>

<div class="col-md-6 mb-3">
<label>Slot ID</label>
<input
type="number"
id="slotId"
class="form-control"
placeholder="Example: 4"
/>
</div>

</div>

<div class="mb-3">
<label>Name</label>
<input
type="text"
id="name"
class="form-control"
/>
</div>

<div class="mb-3">
<label>Email</label>
<input
type="email"
id="email"
class="form-control"
/>
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label>Start Time</label>
<input
type="datetime-local"
id="startTime"
class="form-control"
/>
</div>

<div class="col-md-6 mb-4">
<label>End Time</label>
<input
type="datetime-local"
id="endTime"
class="form-control"
/>
</div>

</div>

<button
onclick="bookSlot()"
class="btn btn-primary btn-book w-100"
>
Book Slot
</button>

<h5
id="result"
class="text-success text-center mt-4"
></h5>

<hr class="my-4">

<div class="d-grid">
<a
href="maindashboard.html"
class="btn btn-outline-secondary"
>
Back to Dashboard
</a>
</div>

</div>

</div>

</div>

</div>

<script src="../js/dashboard.js"></script>

</body>
</html>
